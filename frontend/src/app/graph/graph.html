<div class="graph-header">
  <app-unit-toggle />
</div>

<div class="graphs-grid">

  <mat-card>
    <mat-card-header>
      <mat-card-title>Unit Weight</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <div class="chart-wrapper">
        <canvas baseChart type="line"
          [data]="unitWeightChartData()"
          [options]="unitWeightOptions()">
        </canvas>
      </div>
    </mat-card-content>
  </mat-card>

  <mat-card>
    <mat-card-header>
      <mat-card-title>Water Content</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <div class="chart-wrapper">
        <canvas baseChart type="line"
          [data]="waterContentChartData()"
          [options]="waterContentOptions()">
        </canvas>
      </div>
    </mat-card-content>
  </mat-card>

  <mat-card>
    <mat-card-header>
      <mat-card-title>Shear Strength</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <div class="chart-wrapper">
        <canvas baseChart type="line"
          [data]="shearStrengthChartData()"
          [options]="shearStrengthOptions()">
        </canvas>
      </div>
    </mat-card-content>
  </mat-card>

</div>
